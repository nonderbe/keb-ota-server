server {
    listen 80;
    server_name firmware.local-share.com;

    # Firmware binaries: rechtstreeks van schijf
    location /files/ {
        alias /var/www/firmware/;
        expires off;
        add_header Cache-Control "no-cache";
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # OTA API: rate-limited proxy naar Go server
    location /ota/ {
        limit_req zone=ota_check burst=5 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }

    # Admin API: beschermd via X-Admin-Token header
    location /admin/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
